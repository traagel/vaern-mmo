# NPC display-name → EverythingLibrary mesh species + scale.
#
# Keyed by the exact `name:` field in `src/generated/world/zones/*/mobs/`
# YAMLs. At server spawn time, `vaern-server::npc_mesh::lookup(name)`
# returns `{mesh, scale}` for the replicated `NpcMesh` component.
# Absent entries (or `mesh: null`) render as blue cuboids.
#
# Scale conventions:
#   - `Juvenile <x>`   → 0.70 × base
#   - `Alpha <x>`      → 1.15 × base
#   - `Matriarch <x>`  → 1.15 × base
#   - `The <x>` bosses → 1.30 × base
#
# Humanoid mobs (Bandit, Cultist, Guard, Paladin, …) are `null` — they
# have no EverythingLibrary equivalent and stay as blue cuboids until
# the Quaternius-humanoid NPC render path lands.
#
# Undead / ethereal (Wraith / Ghost / Shade / Revenant / Spirit / Wight)
# use the `Skeleton` part-mesh from AnimalParts/Skeleton as a visible
# stand-in. Elementals / golems / "things" remain null.

# Archetype templates — referenced by `humanoid: <key>` in entries:
# below. Each resolves to a full `PersistedCosmetics` and replicates
# as `NpcAppearance` so the client spawns a Quaternius character
# wearing this outfit. All string fields are serde tags, matching
# `vaern-persistence::cosmetic` (outfit / head_piece / hair / beard
# / color). `color` applies to every outfit-bearing slot.
humanoid_archetypes:
  peasant_male:
    gender: male
    body: peasant
    legs: peasant
    arms: peasant
    feet: peasant
    hair: simple_parted
    beard: full
    color: v1
  peasant_female:
    gender: female
    body: peasant
    legs: peasant
    arms: peasant
    feet: peasant
    hair: long
    color: v1
  ranger_male:
    gender: male
    body: ranger
    legs: ranger
    arms: ranger
    feet: ranger
    hair: simple_parted
    beard: full
    color: v2
  ranger_hooded_male:
    gender: male
    body: ranger
    legs: ranger
    arms: ranger
    feet: ranger
    head_piece: ranger_hood
    hair: simple_parted
    beard: full
    color: v2
  ranger_female:
    gender: female
    body: ranger
    legs: ranger
    arms: ranger
    feet: ranger
    hair: long
    color: v2
  wizard_male:
    gender: male
    body: wizard
    legs: wizard
    arms: wizard
    feet: wizard
    hair: simple_parted
    beard: full
    color: v2
  wizard_hooded_male:
    gender: male
    body: wizard
    legs: wizard
    arms: wizard
    feet: wizard
    head_piece: ranger_hood   # Quaternius ships no wizard hood — ranger hood stands in
    hair: simple_parted
    beard: full
    color: v2
  wizard_female:
    gender: female
    body: wizard
    legs: wizard
    arms: wizard
    feet: wizard
    hair: long
    color: v2
  knight_plate_male:
    gender: male
    body: knight
    legs: knight
    arms: knight
    feet: knight
    head_piece: knight_armet
    hair: buzzed
    beard: full
    color: v2
  knight_cloth_male:
    gender: male
    body: knight_cloth
    legs: knight
    arms: knight
    feet: knight
    head_piece: knight_armet
    hair: buzzed
    beard: full
    color: v3
  noble_male:
    gender: male
    body: noble
    legs: noble
    arms: noble
    feet: noble
    head_piece: noble_crown
    hair: simple_parted
    beard: full
    color: v1
  noble_female:
