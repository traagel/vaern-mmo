# Human-readable classification for each Meshtint base-character
# piece-node variant. Separate per gender since the base meshes ship
# different variant sets per gender.
#
# Schema:
#   <gender>:
#     <category>:       # torso | bottom | feet | hand | belt
#       <variant_nn>:
#         name: "display name"          # shown in UI + future item→mesh map
#         kind: <archetype>             # bare | cloth | leather | plate |
#                                       # robe | priest | monk  (optional)
#         tags: [list]                  # optional free-form tags
#
# Consumers:
#   - vaern-museum: labels the outfit sliders with `name`
#   - vaern-client / item system (future): map item archetypes onto mesh
#     variants by (kind, tags) filters
#
# Status:
#   male.torso: fully classified from visual inspection
#   male.bottom, feet, hand, belt: TODO
#   female.* : TODO

male:
  torso:
    1:  { name: "Bare Torso",                kind: bare,    tags: [sleeveless] }
    2:  { name: "Long-Sleeve Shirt",         kind: cloth,   tags: [sleeves] }
    3:  { name: "Open Chest Coat",           kind: cloth,   tags: [coat, open] }
    4:  { name: "Tunic",                     kind: cloth }
