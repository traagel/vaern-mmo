server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ─── cache control ───
    # Long-lived cache for the heavy image trees (icons, emblems, characters,
    # assets/meshy). They're regenerated rarely; new content goes under new
    # filenames or directories. 30-day immutable is safe.
    location ~* \.(png|jpg|jpeg|webp|gif|svg|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # data.json + html/js/css are versioned by image tag — keep them short
    # so a re-deploy is visible quickly without dramatic CDN bypass.
    location ~* \.(json|html|js|css)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ─── routing ───
    # The compendium uses pure hash routing (#zone/foo, #dungeon/bar etc).
    # No SPA fallback needed — index.html serves everything.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable nginx's default access-log to /dev/stdout (already does so);
    # silence the favicon 404 noise.
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    # Don't expose ngx version banner.
    server_tokens off;
}
