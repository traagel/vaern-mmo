# Vendors — pre-alpha v1.
#
# One general-goods vendor per starter-zone capital hub. Stock is
# authored flat (infinite supply) per listing; all listings ship with
# no affixes and default to "regular" quality. Server prices via
# `vendor_buy_price` / `vendor_sell_price` from vaern-economy, so
# pricing tuning lives in the economy crate and flows here
# automatically.
#
# Schema:
#   id:               stable lookup key; appears in logs only.
#   display_name:     shown on the nameplate + vendor window title.
#   zone_id + hub_id: placement. hub_id must match a hub YAML in that zone.
#   archetype:        optional humanoid mesh archetype key (see
#                     assets/npc_mesh_map.yaml). Omit for hashed fallback.
#   listings:         [ { base_id, material_id?, quality_id?, stock? } ]
#                     stock: null or absent = infinite. material_id/quality_id
#                     omitted = (none) / "regular".

vendors:
  # ── Dalewatch Marches (Mannin) ──
  - id: vendor_dalewatch_keep_general
    display_name: "Merchant Kell"
    zone_id: dalewatch_marches
    hub_id: dalewatch_keep
    archetype: noble_male
    listings:
      - { base_id: minor_healing_potion }
      - { base_id: minor_mana_potion }
      - { base_id: minor_stamina_potion }
      - { base_id: bread_loaf }
      - { base_id: hardtack }
      - { base_id: traveler_rations }
      - { base_id: scroll_of_recall }
      - { base_id: cloth_shirt, material_id: linen }
      - { base_id: cloth_trousers, material_id: linen }
      - { base_id: cloth_cowl, material_id: linen }
      - { base_id: short_sword, material_id: copper }
      - { base_id: handaxe, material_id: copper }

