id: marshland
name: Marshland
description: |
  Slow black water under a permanent mist, sedge islands joined by
  half-rotten plank-walks, the air thick enough to taste. People who
  live here learn the safe paths and never share them. Rot-fever is
  endemic; the gnats are worse.
prompt: >-
  wide establishing landscape, mist-bound marshland of sedge and black
  water, half-submerged plank walkway, dead trees, low pale dawn light,
  painterly atmospheric, no figures
climate: humid, fog-bound, disease-prone
hazards:
- sinking-mire
- miasma
- rot-fever
typical_flora:
- sedge
- bog-myrtle
- lichen
typical_fauna:
- crocodilian
- blood-gnat
- marsh-drake
faction_affinity: faction_b
