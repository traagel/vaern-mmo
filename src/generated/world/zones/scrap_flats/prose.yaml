zone:
  vibe: Skrel industrial sprawl — alchemy-works, conveyor pits, acid sumps.
  description: The Skrel industrial heart, north of the Scrap Marsh — full alchemical works,
    conveyor pits, vat-tanks of questionable acid going through dubious processes for rumoured
    Hraun contracts. The Great Warren under the works is the Skrel capital in everything but
    politics. Tinker explosions are routine; tinker successes are political.
  prompt: wide establishing landscape, sprawling alchemical scavenger-industrial works on
    a marshy flat, vat-tanks and conveyors, sickly green smoke columns, dim amber dusk, painterly
    atmospheric, no figures
hubs:
  great_warren:
    description: The Skrel mid-capital — a deep-warren capital under the alchemical works,
      lit by phosphor-fungus and ventilated by stolen Hearthkin shaft-design. Boss-of-Bosses
      Vrag keeps the rolls and the recipes; she does not let outsiders see either. Pretend
      not to notice and you'll be fine.
    prompt: establishing shot, vast Skrel under-warren capital under alchemical works, phosphor-fungus
      glow, scaffolded ventilation shafts, sickly green light, painterly atmospheric, no figures
  rust_creek:
    description: A waste-water Skrel outpost on the eastern Flats — built around a rust-creek
      that runs the colour of dried blood from upstream tinker-vats. The locals call it good
      fishing water and the Hold prefers not to ask why.
    prompt: establishing shot, Skrel outpost beside a rust-red runoff creek, plank walkways
      and scrap shelters, sickly amber-green dusk, painterly atmospheric, no figures
  scavenger_mound:
    description: A scavenger-camp on the western marsh edge — half a warren, half a workshop,
      full of Skrel who specialise in extracting valuable Hearthkin scrap from very old wrecks.
      The scrap, unfortunately, sometimes objects to being extracted.
    prompt: establishing shot, Skrel scavenger mound camp on a marsh flat, salvaged metal
      sheds and tarps, vat-tanks of acid, low pale light, painterly atmospheric, no figures
  pit_tinker:
    description: The pit-works that the tinkers actually live in — a vertical Skrel industrial
      complex of conveyor-pits, vat-tanks and scaffolded gantries. Site-Boss Glub runs the
      works and considers explosions a normal cost of doing business; the Hold considers them
      political when they damage anything important.
    prompt: establishing shot, vertical Skrel industrial pit complex, scaffold gantries and
      conveyor pits, vat-tanks of acid and steam, sickly green smoke columns, painterly atmospheric,
      no figures
landmarks:
  conveyor_skeleton:
    description: A pre-Coming conveyor scaffold the Skrel kept upright because it works. The
      conveyor is patched with a hundred different alloys and produces an unpredictable noise.
    prompt: establishing shot, towering pre-Coming industrial conveyor scaffold patched with
      mixed metals, smoke columns, sickly green light, painterly atmospheric, no figures
  vat_field:
    description: A field of open vat-tanks at varying acid concentrations. The Skrel maintain
      them by formal rota. The Hearthkin will not approach within a kilometre.
    prompt: establishing shot, open field full of square acid vat-tanks, sickly green-amber
      light, scrap-built walkways between them, painterly atmospheric, no figures
  alloy_pillar:
    description: A pillar cast from two centuries of failed alloy experiments, layered like
      a tree-ring. Skrel scholars come to read it; they leave with arguments.
    prompt: establishing shot, tall layered alloy pillar in a marshy industrial flat, sickly
      green-amber dusk, painterly atmospheric, no figures
  rust_field:
    description: A field where every salvaged piece of Concord iron has gone to rust. The
      Skrel keep it as inventory. The inventory is extensive.
    prompt: establishing shot, vast field of rusted salvaged iron pieces in disorderly piles,
      sickly amber-green dusk, painterly atmospheric, no figures
