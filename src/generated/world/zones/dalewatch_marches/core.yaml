description: "The Concord's eastern frontier \u2014 a green river-valley of yeoman\
  \ farms,\nkingsroads, and warden patrols, watched from Dalewatch Keep at the heart\n\
  of the Marches. Three crises meet here. East at the Ford of Ashmere,\nPact scouts\
  \ are crossing in numbers nobody can explain. South in the\nBlackwash Fens, the\
  \ drifters who fled the Censure three years ago have\nmade common cause with something\
  \ older than the Concord. And along the\ncairn-ridges and copper drifts under the\
  \ keep, the country itself is\nstarting to misbehave. The Warden Corps rides the\
  \ line so the plough\nstays in the field \u2014 but the line is thinning, and you\
  \ ride it the\nmorning you take the oath.\n"
