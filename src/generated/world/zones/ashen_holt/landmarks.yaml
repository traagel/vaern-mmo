id: landmarks__ashen_holt
zone: ashen_holt
landmarks:
- id: burnt_arbor
  name: The Burnt Arbor
  offset_from_zone_origin:
    x: 200.0
    z: -110.0
  description: A pre-Coming Sunward Elen arbour the Darkling Elen burned publicly in the second
    year of the Coming, and have never rebuilt or removed. A Reach scholar tends the cooled
    scorch-marks.
  prompt: establishing shot, ruined burned-out arbour of pale stone in an ashen forest, scorch
    marks on broken pillars, sickly amber twilight, painterly atmospheric, late-medieval dark
    elf, no figures
- id: blackleaf_spring
  name: The Blackleaf Spring
  offset_from_zone_origin:
    x: -150.0
    z: 90.0
  description: A spring whose water comes out faintly black and tastes faintly of iron. The
    Darkling Elen consider it healthful; outsiders are advised to drink something else.
  prompt: establishing shot, dark forest spring with faintly black water, mossy stones, dim
    sickly amber-red light, painterly atmospheric, late-medieval dark elf, no figures
- id: crow_pillar
  name: The Crow Pillar
  offset_from_zone_origin:
    x: 90.0
    z: 230.0
  description: A black basalt pillar around which a colony of crows nest. The Darkling Elen
    consider the crows registered citizens for augury purposes. The crows decline to comment.
  prompt: establishing shot, single black basalt pillar in an ashen forest, crows on every
    branch and the pillar's cap, dim amber-red light, painterly atmospheric, late-medieval,
    no figures
- id: ash_grave_circle
  name: The Ash-Grave Circle
  offset_from_zone_origin:
    x: -90.0
    z: -210.0
  description: A circle of low burial-mounds that the Darkling Elen tend by rota. The mounds
    are older than the Coming. The names on the stones don't match the rolls.
  prompt: establishing shot, circle of low ash-covered burial mounds in a dark forest clearing,
    leaning weathered stones, sickly amber dusk, painterly atmospheric, late-medieval, no
    figures
