design_notes:
- Denser than WoW Classic's ~20 five-mans; Vaern aims for ~26 five-mans + 4 ten-mans
  + 2 twenty-mans
- "No 40-man tier \u2014 the strict-coop household/guild social unit does not support\
  \ it"
- Every contested and endgame zone has at least one instance entrance
- Mid-tier 5-mans cluster at 18-35 to carry players through the second long xp stretch
