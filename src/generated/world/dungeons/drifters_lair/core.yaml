id: drifters_lair
name: The Drifter's Lair
description: |
  The cave the Drifter cultists made their anchor. Two-room pseudo-
  dungeon: an outer chamber where Master Drifter Halen runs his rite,
  and an inner sanctum where Grand Drifter Valenn binds the Brine-Shade
  Primarch at half-health. The walls breathe between bosses. Tight-coop
  friendly — duo or trio can clear it under-level if they're careful.
prompt: >-
  establishing shot, dungeon interior, low-vaulted carved stone chamber
  lit by a single ritual brazier, Drifter wards painted on the walls,
  mist seeping from the floor, painterly atmospheric, oppressive mood,
  no figures
kind: dungeon
group_size: 5
zone: dalewatch_marches
entrance_hub: ford_of_ashmere
level_range:
  min: 9
  max: 10
level_band: 1-10
tier: leveling
boss_count: 2
estimated_clear_minutes: 45
loot_tier: low
lockout: none (rerunnable)
theme: "The Wake's anchor in the Blackwash Fens \u2014 an Academian's expelled Wake-rite,\
  \ now a 2-4-player capstone"
coop_notes: tight-coop-friendly; duo/trio can attempt under-level with care
