# Flagship race × class × faction pairings for priority portrait generation.
# One per race in its favored class on its native faction. These are the
# first 10 images to generate when validating the race + class + faction
# prompt composer.
#
# class_id matches src/generated/classes/NN_label.yaml
# faction must be a race's own faction (morality gating is enforced by the
# school layer; class position itself is morality-neutral).
#
# Additional combos can be added later; this file is the seed set.

flagship:
  # --- Concord (faction_a) ---
  - id: mannin_fighter_concord
    race: mannin
    class_id: 0
    class_label: Fighter
    faction: faction_a
