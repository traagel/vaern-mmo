founded: the Second Pact-War, when the first duellists swore to bear their patrons' sigils openly
home: "no fixed hall \u2014 Shadow-Bound move between safehouses in Rend cities"
oath: My shadow is my second; the pact is my third
patron: the pact-patron varies per initiate (never spoken aloud); the Order itself serves no unified patron
recruitment: pact-duel; candidate and sponsor duel until one yields, and the patron's sigil appears on the victor
doctrine: every bound pact is witnessed; a hidden patron is a lying patron
