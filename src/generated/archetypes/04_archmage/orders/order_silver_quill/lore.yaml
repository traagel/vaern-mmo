founded: the First Library, in an age before the Concord's name
home: the Vault of Scriveners, cut into the cliffs above Sunward march
oath: The word is the weapon; the page is the shield
patron: the Twelve Scribes (twelve robed statues lining the vault antechamber; no names, no texts)
recruitment: submission of an original treatise; a senior scribe judges, admits, and assigns a working-desk
doctrine: magic without literacy is wildfire; every cantrip must be citable
