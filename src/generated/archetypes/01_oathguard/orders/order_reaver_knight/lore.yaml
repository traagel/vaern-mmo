founded: after the Broken Oath, when the first Hraun host made landfall
home: "the Ember Keep \u2014 a converted Veyr ruin on the Rendmark coast"
oath: "Blood answers blood \u2014 no shield without scars"
patron: the Burnt Saint, a Veyr oath-breaker martyred by their own order
