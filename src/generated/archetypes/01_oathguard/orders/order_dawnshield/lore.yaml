founded: the Third Concord, after the Broken Vigil
home: Temple of the First Dawn, in the Sunward march
oath: "Shield of the morning \u2014 first to stand, last to fall"
patron: the Radiant, veiled aspect of the dawn-spirit
recruitment: rite of dawn-vigil; candidates keep watch from sunrise to sunset in the temple's courtyard, unspoken
doctrine: light is held by those willing to stand between it and the dark
