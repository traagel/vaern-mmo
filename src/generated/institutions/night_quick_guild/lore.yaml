description: the Concord's sanctioned shadow-corps — infiltrators, cutters, scouts, poisoners (on a short leash), and lockbreakers. Operates by charter, pays Concord tithe, deniable when required.
founded: the Shadow Census — when the Concord catalogued and formalized its stealth-corps
home: the Quick-Halls — unmarked safehouses in every major Concord city
doctrine: the Concord needs what it cannot acknowledge
patron: the Quiet — an unspoken agreement rather than a figure
recruitment: recognition by a senior, a trial-run, a binding-oath of silence
