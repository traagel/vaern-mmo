description: Rend's rage-discipline tradition — not berserker-chaos, but taught channeled fury. Warrior-priests who bleed for every rite. Parallel to the Forge-Chapel but where Concord consecrates weapons, the Fury-Houses consecrate the wielder.
founded: a clan-tradition of ritual-warriors who survived the crossing famines by rage alone
home: the Fury-Houses — clan-camps where ritual circle and combat ring share a floor
doctrine: I strike; I bleed; I bless what remains
patron: the First Wound — the pre-crossing saint whose scar is said to have taught every fury rite
recruitment: the candidate stands unarmed in the ring until they break open of their own will
