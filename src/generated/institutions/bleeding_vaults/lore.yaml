description: the Rend's dark-scholar tradition — a blood-inked library-cult where every spell entry costs the scribe a drop. Rough Rend counterpart to the Silver Quill but darker, more individual, more personal.
founded: the Scriptorum of Scars, after the Hraun refused to forget the cost of their crossing
home: the Bleeding Vaults — hidden libraries where scar-ink replaces regular ink
doctrine: every spell is a wound; the wound is the receipt
patron: the Unfinished Book — the legend that the first Hraun sorcerer's journal is still being written
recruitment: submission of a rite-scar sigil; admission is marked with the same on the initiate
