description: the Concord's formal drill-tradition — infantry, pike, shield-wall, and disciplined unarmed combat. Secular, military-civic, every Concord settlement runs a Phalanx muster ground.
founded: the Second Concord militia reforms
home: the March Muster Grounds — distributed across every major Concord city
doctrine: the line is the law; the line is the life
patron: the Standing Stones — the practice-pikes every muster ground raises at dawn
recruitment: mandatory civic training; advanced ranks by merit and oath
