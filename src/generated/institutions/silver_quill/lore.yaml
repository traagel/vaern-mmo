description: a secular scholastic order of arcane researchers, librarians, and theorists. Pre-dates the Concord's religious hierarchy; uneasy but cooperative relationship with the Radiant Church.
founded: the First Library, before the Concord's naming
home: the Vault of Scriveners, cut into the cliffs above Sunward march
doctrine: magic without literacy is wildfire; every cantrip must be citable
patron: the Twelve Scribes — twelve unnamed robed statues in the vault antechamber
recruitment: submission of an original treatise; a senior scribe judges and assigns a working-desk
