description: Concord's principal religious institution, sworn to the Radiant aspect — a veiled dawn-spirit whose liturgy predates the Concord itself.
founded: long before the Concord; absorbed into its civic structure by the Second Accord
home: the Twelve Halls — cathedral-fortresses with attached scriptoria
doctrine: light is a duty, carried by those willing to stand between it and the dark
patron: the Radiant
recruitment: postulants complete a year of dawn-vigils before admission
