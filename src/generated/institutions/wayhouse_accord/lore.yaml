description: a loose confederation of bards, traveling minstrels, wayhouse-keepers, and wandering scholars. The Concord's itinerant-intellectual class — neither cathedral nor castle, but something stitched between them.
founded: the First Wayhouse Accord, granting Concord safe-passage to roving minstrels
home: no central seat — a network of inns, taverns, and road-chapterhouses
doctrine: a story told well changes more minds than a sermon
patron: the Road Itself — a figure of personified journey, never named twice the same
recruitment: invitation by an initiated wayhouse-keeper; audition by an original composition
