description: the Hraun's oldest religious tradition — binding ancestors into weapons, shrines, and kin. Every Rend clan-hall hosts a Binder-House chapter. Rough counterpart to Concord's Radiant Church.
founded: predates the Hraun crossing; carried across the sea intact
home: the Hollowhouses — chapter-crypts beneath every major Rend settlement
doctrine: the ancestor-chain is older than any oath; I speak for the whole line
patron: the Chain Itself — the collective voice of bound ancestors
recruitment: the candidate is presented to the crypt; if an ancestor answers, they are accepted
