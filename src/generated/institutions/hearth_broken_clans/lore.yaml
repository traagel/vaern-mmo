description: Rend's raider-clan martial tradition — the muscle of the Hraun host. Every clan runs its own training-ring, but the collective tradition is called the Hearth-Broken — those who lost their original hearths in the crossing and forged new ones by raid.
founded: in the first raid-camps after the Hraun landing
home: the Iron Hearths — shared clan-halls where raid-captains muster crews
doctrine: the raid is the economy; the banner is the crew
patron: no figure — the clan-hearth itself is the patron
recruitment: by blood-tie, raid-debt, or challenge-combat
