description: Rend's weather-binder tradition — nomadic shamans who bind storm-ancestors to their service. Counterpart to the Concord's Circle of Roots, but aggressive, mobile, clan-aligned rather than grove-aligned.
founded: from the plains-clan shamans who first bound storm-ancestors
home: no fixed seat — Storm-Pact shamans move with the herds and the weather
doctrine: the wind knows my name; the wind answers me
patron: the Rolling Storm — a nameless weather-spirit that the Pact treats as kin
recruitment: the candidate walks into an active storm; if they return, they are initiated
