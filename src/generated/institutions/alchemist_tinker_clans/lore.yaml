description: Rend's scavenger-craft tradition — small-folk and clever-hands who make poisons, traps, and scrap-agents from whatever the warbands leave behind. Technically informal, but every raid-clan keeps at least one.
founded: in the Hraun landing-camps, born of necessity and salvage
home: no chapter-houses — Tinker-Clans attach to raid-bands and clan-hearths
doctrine: what the raid breaks, the tinker bottles
patron: the Patchwork — the collective pride of scavenged craft
recruitment: apprenticed young; a Tinker's first kill is a thrown experiment they mixed themselves
