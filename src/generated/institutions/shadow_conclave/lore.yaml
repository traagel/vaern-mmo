description: Rend's pact-bound assassin-mage tradition — where Concord's Night-Quick operates under sanction, the Shadow-Conclave operates under patrons. Each initiate takes a different pact; the Conclave itself serves no unified master.
founded: the Second Pact-War, when shadow-duellists first swore to bear their patrons' sigils openly
home: no fixed hall — Shadow-Conclave chapters move between safehouses in Rend cities
doctrine: every bound pact is witnessed; a hidden patron is a lying patron
patron: varies per initiate (never spoken aloud)
recruitment: pact-duel — the candidate and sponsor duel until one yields; the patron's sigil appears on the victor
