description: a druidic wildkeeper tradition older than any Veyr kingdom, absorbed into the Concord through treaty. Holds the forests and the wild places in covenant with the civilized lands.
founded: among the Firland clans and the pre-Concord wildkeepers
home: the Deepwood Chapterhouses — circles of standing-stones in ancient groves
doctrine: civilization and the wild are allies when both honor the pact
patron: the Many-Horned — a stag-spirit who speaks through antlers left on standing stones
recruitment: apprenticeship to a circle-elder; a season spent alone in the Deepwood
